# =============================================================================
# Azure AI Foundry ICF Connector ? Display & Help Messages
# =============================================================================

# -------------------------
# Connector (bundle-level)
# -------------------------
connector.display=Azure AI Foundry Connector
connector.help=Connector that inventories Azure AI Foundry Agents, Tools, Knowledge Bases, and Guardrails using Azure APIs and a tools-inventory JSON source.

# -------------------------
# Configuration Properties
# -------------------------

# ---- Tenant / Subscription / Workspace ----
tenantId.display=Tenant ID
tenantId.help=Azure Active Directory tenant ID (GUID) where Azure AI Foundry resources reside.

subscriptionId.display=Subscription ID
subscriptionId.help=Azure subscription ID that contains the Azure AI Foundry workspace.

resourceGroupName.display=Resource Group Name
resourceGroupName.help=Name of the Azure Resource Group containing the workspace.

workspaceName.display=Workspace Name
workspaceName.help=Azure AI Foundry workspace name used for agent discovery and operations.

defaultLocation.display=Default Region
defaultLocation.help=Azure region where AI Foundry resources (agents, tools, KBs, guardrails) are deployed.

# ---- Endpoints ----
agentServiceEndpoint.display=Agent Service Endpoint
agentServiceEndpoint.help=Base endpoint for Azure AI Foundry Agents API, e.g., https://<region>.api.azureml.ms.

# ---- Authentication ----
useManagedIdentity.display=Use Managed Identity
useManagedIdentity.help=If true, the connector authenticates using a managed identity attached to the runtime environment. If false, a service principal (clientId + clientSecret) is used.

clientId.display=Client ID
clientId.help=Client ID (Application ID) of a service principal when managed identity is not used.

clientSecret.display=Client Secret
clientSecret.help=Client secret for the service principal. Required only when useManagedIdentity=false.

# ---- Tools Inventory (JSON) ----
toolsInventoryUrl.display=Tools Inventory URL
toolsInventoryUrl.help=HTTP(S) URL pointing to the tools-inventory JSON document that includes tools, knowledge bases, guardrails, and agent relationships.

toolsInventoryFilePath.display=Tools Inventory File Path
toolsInventoryFilePath.help=Local filesystem path to the tools-inventory JSON document. Used only if toolsInventoryUrl is not provided.

# ---- Behavior Flags ----
identityBindingScanEnabled.display=Identity Binding Scan Enabled
identityBindingScanEnabled.help=Enables scanning Azure RBAC roles to produce Identity Bindings. Currently optional and may require additional privileges.

agentNameFilterRegex.display=Agent Name Filter Regex
agentNameFilterRegex.help=Optional regular expression used to restrict which agents are returned during discovery.

maxAgentsToFetch.display=Maximum Agents to Fetch
maxAgentsToFetch.help=Optional limit on the number of agents returned from Azure AI Foundry. Useful in large environments.

httpTimeoutSeconds.display=HTTP Timeout (Seconds)
httpTimeoutSeconds.help=Timeout in seconds for outgoing HTTP requests to Azure APIs.

# ---- Debug / Logging ----
logPayloads.display=Log Payloads
logPayloads.help=If true, the connector logs agent/tool/KB/guardrail JSON responses. Useful for troubleshooting, but not recommended in production.